<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarjetas | Pierovski Center</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d1b2a">
<link rel="apple-touch-icon" href="icon-192x192.png">

<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;0,700&family=Fraunces:ital,wght@0,300;0,600;0,700;1,300&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
:root {
  --cream: #f5f0e8; --paper: #faf7f2; --navy: #0d1b2a; --navy2: #1a2e45;
  --gold: #c8922a; --rust: #b84c2a; --sage: #4a7c59; --ink: #2a2420; --muted: #8a7e72; --border: #d8cfc4; --surface3: #eef0f2;
  /* Colores de Tarjetas */
  --bbva: #004481; --bcp: #ff7800; --bcp-blue: #002a8d; --ripley: #6a1b9a; --oh: #171717; --cmr: #059669;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--paper); color: var(--ink); font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; padding-bottom: 80px; }

/* HEADER */
header { padding: 40px 24px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-end; background: var(--paper); position: sticky; top: 0; z-index: 100; }
.logo-area h1 { font-family: 'Fraunces', serif; font-size: 28px; color: var(--navy); line-height: 1.1; margin-bottom: 6px; display: flex; align-items: center; gap: 10px;}
.logo-area .sub { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; display: block; margin-top: 4px; }
.btn-back-dash { font-size: 0.8rem; text-decoration: none; color: var(--text-muted); font-weight: 500; display: flex; align-items: center; gap: 4px; transition: color 0.2s; font-family: 'DM Mono', monospace; border: 1px solid var(--border); padding: 6px 12px; border-radius: 4px;}
.btn-back-dash:hover { color: var(--navy); background: var(--cream); }

.cloud-status { width: 10px; height: 10px; border-radius: 50%; background: #cbd5e1; box-shadow: 0 0 5px rgba(0,0,0,0.1); }
.cloud-online { background: var(--sage); box-shadow: 0 0 8px var(--sage); }
.cloud-syncing { background: var(--gold); animation: pulse-cloud 1s infinite; }
@keyframes pulse-cloud { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

main { max-width: 1000px; margin: 0 auto; padding: 32px 24px; }

/* METRICAS */
.metrics-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; }
.mcard { background: #fff; border: 1px solid var(--border); padding: 20px; border-radius: 4px; text-align: center; border-top: 3px solid var(--border); }
.mcard.mc-red { border-top-color: var(--rust); }
.mcard.mc-green { border-top-color: var(--sage); }
.m-title { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.m-val { font-family: 'Fraunces', serif; font-size: 24px; font-weight: 600; color: var(--navy); }

/* GRID DE TARJETAS */
.cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
.cc-card { background: #fff; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; position: relative; }
.cc-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.06); }
.cc-header { padding: 20px; color: #fff; display: flex; justify-content: space-between; align-items: flex-start; }
.cc-name { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 600; margin-bottom: 4px; }
.cc-cat { font-family: 'DM Mono', monospace; font-size: 10px; opacity: 0.8; text-transform: uppercase; letter-spacing: 1px; }
.cc-line { font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 700; background: rgba(0,0,0,0.2); padding: 4px 8px; border-radius: 4px; letter-spacing: 0.5px; text-transform: uppercase; }

.cc-body { padding: 20px; }
.cc-dates { display: flex; justify-content: space-between; margin-bottom: 20px; border-bottom: 1px solid var(--surface3); padding-bottom: 16px; }
.date-box { text-align: center; }
.date-lbl { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.date-val { font-size: 16px; font-weight: 700; color: var(--navy); display: flex; flex-direction: column; align-items: center;}
.date-val.urg { color: var(--rust); }
.days-left { font-size: 10px; font-weight: 500; padding: 2px 6px; border-radius: 4px; margin-top: 4px; }
.days-left.danger { background: var(--rust); color: #fff; }
.days-left.safe { background: var(--surface3); color: var(--muted); }

/* ⚡ ANIMACIÓN POP PARA EL BOTÓN ⚡ */
@keyframes popIn {
  0% { transform: scale(0.95); }
  50% { transform: scale(1.05); }
  100% { transform: scale(1); }
}

.cc-action { width: 100%; border: none; padding: 12px; font-family: 'DM Mono', monospace; font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; border-radius: 4px; cursor: pointer; transition: 0.2s; }
.btn-pay { background: var(--surface3); color: var(--navy); border: 1px solid var(--border); }
.btn-pay:hover { background: var(--border); }
.btn-paid { 
  background: var(--sage); color: #fff; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.1); 
  animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
}
.btn-paid::before { content: '✓ '; }

/* COLORES DINÁMICOS */
.color-azul-bbva { background: var(--bbva); }
.color-naranja { background: var(--bcp); }
.color-azul-bcp { background: var(--bcp-blue); }
.color-morado { background: var(--ripley); }
.color-negro { background: var(--oh); }
.color-verde { background: var(--cmr); }

@media (max-width: 600px) { .metrics-row { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header>
  <div class="logo-area">
    <h1>TARJETAS <div id="cloud-indicator" class="cloud-status" title="Estado de la Nube"></div></h1>
    <a href="index.html" class="btn-back-dash">← Volver al Comando</a>
  </div>
</header>

<main>
  <div class="metrics-row">
    <div class="mcard mc-red">
      <div class="m-title">Tarjetas por Pagar</div>
      <div class="m-val" id="tarjetasPendientes" style="color: var(--rust);">0</div>
    </div>
    <div class="mcard mc-green">
      <div class="m-title">Tarjetas Pagadas</div>
      <div class="m-val" id="tarjetasPagadas" style="color: var(--sage);">0</div>
    </div>
  </div>
  <div class="cards-grid" id="cardsContainer"></div>
</main>

<div id="toast" style="position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--navy); color:#fff; padding:10px 20px; border-radius:30px; font-family:'DM Mono', monospace; font-size:12px; opacity:0; transition:0.3s; pointer-events:none; z-index: 1000;"></div>

<script>
/* FIREBASE CONFIG */
const firebaseConfig = { apiKey: "AIzaSyAyHBUWX-bs89MAUR8F_C92MGsqB85et1g", authDomain: "pierovski-center.firebaseapp.com", databaseURL: "https://pierovski-center-default-rtdb.firebaseio.com", projectId: "pierovski-center" };
if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
const db = firebase.database();

const SK = 'tarjetasPremiumV3';
let tarjetas = [];

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.opacity = '1';
  setTimeout(() => t.style.opacity = '0', 2000);
}

// ⚡ MOTOR DE SONIDO SINTETIZADO ⚡
const AudioContext = window.AudioContext || window.webkitAudioContext;
const audioCtx = new AudioContext();

function playSuccessSound() {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  
  osc.type = 'sine';
  osc.frequency.setValueAtTime(800, audioCtx.currentTime); 
  osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1); 
  
  gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1); 
  
  osc.start();
  osc.stop(audioCtx.currentTime + 0.1);
}

// AUTO-RESETEO
function autoResetCards(data) {
  const today = new Date(); const currentMonth = today.getMonth(); const currentDay = today.getDate();
  let changed = false;
  data.forEach(t => {
    if (t.paid && currentDay >= t.closing && t.lastResetMonth !== currentMonth) {
      t.paid = false; t.lastResetMonth = currentMonth; changed = true;
    }
  });
  return changed;
}

function syncToCloud() {
  localStorage.setItem(SK, JSON.stringify(tarjetas));
  if (navigator.onLine) {
    const ind = document.getElementById('cloud-indicator');
    ind.className = 'cloud-status cloud-syncing';
    db.ref('pierovski/' + SK).set(tarjetas).then(() => { ind.className = 'cloud-status cloud-online'; });
  }
}

function init() {
  const localData = JSON.parse(localStorage.getItem(SK));
  if (localData) {
    tarjetas = localData;
    if (autoResetCards(tarjetas)) syncToCloud();
    render();
  }

  if (navigator.onLine) {
    db.ref('pierovski/' + SK).once('value').then(snap => {
      if (snap.exists()) {
        tarjetas = snap.val() || [];
        if (autoResetCards(tarjetas)) syncToCloud(); else localStorage.setItem(SK, JSON.stringify(tarjetas));
        render();
        document.getElementById('cloud-indicator').className = 'cloud-status cloud-online';
      }
    });
  }
}

function togglePaid(id) {
  const t = tarjetas.find(x => x.id === id);
  if (!t) return;
  
  t.paid = !t.paid;
  if (t.paid) {
    t.lastResetMonth = new Date().getMonth();
    playSuccessSound(); // ⚡ Suena el "Ting!"
    if (navigator.vibrate) navigator.vibrate(50); // ⚡ Vibra el celular
  }
  
  syncToCloud();
  render();
  toast(t.paid ? 'Tarjeta marcada como Pagada ✓' : 'Marcada como Pendiente');
}

function render() {
  const container = document.getElementById('cardsContainer');
  container.innerHTML = '';
  let pagadas = 0, pendientes = 0;
  const hoy = new Date().getDate();

  const sorted = [...tarjetas].sort((a,b) => {
    if (a.paid !== b.paid) return a.paid ? 1 : -1;
    let faltaA = a.payment - hoy; if (faltaA < 0) faltaA += 30;
    let faltaB = b.payment - hoy; if (faltaB < 0) faltaB += 30;
    return faltaA - faltaB;
  });

  sorted.forEach(t => {
    if (t.paid) pagadas++; else pendientes++;
    let faltaPago = t.payment - hoy; if (faltaPago < 0) faltaPago += 30;
    let urgClass = (!t.paid && faltaPago <= 5) ? 'urg' : '';
    let badgeClass = (!t.paid && faltaPago <= 5) ? 'danger' : 'safe';
    let badgeText = t.paid ? 'Limpio' : `Faltan ${faltaPago} d`;
    let faltaCorte = t.closing - hoy; if (faltaCorte < 0) faltaCorte += 30;

    container.innerHTML += `
      <div class="cc-card">
        <div class="cc-header ${t.color}">
          <div><div class="cc-name">${t.name}</div><div class="cc-cat">${t.category}</div></div>
          <div class="cc-line">ANIV: ${t.anniversary || '---'}</div>
        </div>
        <div class="cc-body">
          <div class="cc-dates">
            <div class="date-box"><div class="date-lbl">Corte</div><div class="date-val">Día ${t.closing} <span class="days-left safe">En ${faltaCorte} d</span></div></div>
            <div class="date-box"><div class="date-lbl">Pago</div><div class="date-val ${urgClass}">Día ${t.payment} <span class="days-left ${badgeClass}">${badgeText}</span></div></div>
          </div>
          <button class="cc-action ${t.paid ? 'btn-paid' : 'btn-pay'}" onclick="togglePaid(${t.id})">
            ${t.paid ? 'Tarjeta Pagada' : 'Marcar como Pagado'}
          </button>
        </div>
      </div>
    `;
  });

  document.getElementById('tarjetasPendientes').textContent = pendientes;
  document.getElementById('tarjetasPagadas').textContent = pagadas;
}

init();
</script>
</body>
</html>
