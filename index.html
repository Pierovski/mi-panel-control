<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pierovski Center</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d1b2a">
    <link rel="apple-touch-icon" href="icon.png">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;600;700&display=swap');
        
        body {
            background-color: #f5f7fa;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: #1e293b;
        }

        /* --- PANTALLA DE BLOQUEO --- */
        #login-screen {
            position: fixed;
            inset: 0;
            background-color: #0d1b2a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            color: white;
            transition: opacity 0.3s ease;
        }

        .login-title {
            font-family: 'DM Mono', monospace;
            font-size: 1.2em;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #e8a838;
            margin-bottom: 30px;
        }

        #pin-input {
            font-family: 'DM Mono', monospace;
            font-size: 2em;
            letter-spacing: 15px;
            padding: 10px;
            border: none;
            border-bottom: 2px solid #52c974;
            background: transparent;
            color: white;
            text-align: center;
            width: 180px;
            outline: none;
        }

        #pin-input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        /* --- TÍTULO ANIMADO Y TECNOLÓGICO --- */
        .brand-container {
            margin: 50px 0 40px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .brand-subtitle {
            font-family: 'DM Mono', monospace;
            font-size: 0.65em;
            letter-spacing: 5px;
            color: #94a3b8;
        }

        .brand-title {
            font-family: 'DM Mono', monospace;
            font-size: 1.8em;
            margin: 0;
            letter-spacing: 2px;
            font-weight: 500;
            color: #0d1b2a;
            position: relative;
            display: inline-block;
        }

        .brand-title::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #e8a838, #52c974, #ef4444, #e8a838);
            background-size: 200% 100%;
            animation: gradient-slide 3s linear infinite;
            border-radius: 2px;
        }

        @keyframes gradient-slide {
            0% { background-position: 100% 0; }
            100% { background-position: -100% 0; }
        }

        /* --- BOTONES --- */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 500px;
        }

        .menu-btn {
            background: white;
            border-radius: 16px;
            padding: 25px 15px;
            text-align: center;
            text-decoration: none;
            color: #334155;
            font-weight: 600;
            font-size: 1em;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            -webkit-tap-highlight-color: transparent;
        }

        .menu-btn:active {
            transform: scale(0.95);
            background-color: #fcfcfc;
        }

        .icon { font-size: 2.2em; }
        .btn-compras { border-bottom: 4px solid #e8a838; }
        .btn-plan { border-bottom: 4px solid #52c974; }
        .btn-tarjetas { border-bottom: 4px solid #ef4444; }

        /* --- MINI RESPALDO DESGLOSABLE --- */
        .mini-backup-container {
            margin-top: 35px;
            text-align: center;
        }

        .btn-toggle-backup {
            background: transparent;
            border: 1px solid #cbd5e1;
            color: #64748b;
            padding: 6px 14px;
            border-radius: 20px;
            font-family: 'DM Mono', monospace;
            font-size: 0.7rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-toggle-backup:hover {
            background: #e2e8f0;
            color: #1e293b;
        }

        #backup-panel {
            display: none;
            margin-top: 12px;
            gap: 8px;
            justify-content: center;
            animation: fadeDown 0.2s ease;
        }

        #backup-panel.show {
            display: flex;
        }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-micro {
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .btn-micro:active { transform: scale(0.95); }
        .btn-micro-exp { background: #0d1b2a; color: white; }
        .btn-micro-imp { background: #e2e8f0; color: #1e293b; }

        /* --- FOOTER --- */
        .footer-note {
            margin-top: auto;
            padding: 30px 0;
            font-size: 0.75em;
            font-family: 'DM Mono', monospace;
            color: #94a3b8;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-title">Acceso Restringido</div>
        <input type="password" id="pin-input" inputmode="numeric" maxlength="4" placeholder="••••" oninput="checkPin()">
        <p id="pin-error" style="color: #ef4444; font-family: 'DM Mono', monospace; font-size: 0.8em; margin-top: 15px; opacity: 0;">PIN Incorrecto</p>
    </div>

    <div class="brand-container">
        <div class="brand-subtitle"></div>
        <h1 class="brand-title">PIEROVSKI CENTER</h1>
    </div>

    <div class="menu-grid">
        <a href="compras.html" class="menu-btn btn-compras">
            <span class="icon">🛒</span>
            <span>Compras 2026</span>
        </a>
        
        <a href="plan.html" class="menu-btn btn-plan">
            <span class="icon">📋</span>
            <span>12 Semanas</span>
        </a>
        
        <a href="tarjetas.html" class="menu-btn btn-tarjetas">
            <span class="icon">💳</span>
            <span>Tarjetas</span>
        </a>
    </div>

    <div class="mini-backup-container">
        <button class="btn-toggle-backup" onclick="document.getElementById('backup-panel').classList.toggle('show')">
            <span>💾</span> Respaldo
        </button>
        
        <div id="backup-panel">
            <button class="btn-micro btn-micro-exp" onclick="exportGlobalBackup()">⬇️ Exportar</button>
            <button class="btn-micro btn-micro-imp" onclick="document.getElementById('importGlobal').click()">⬆️ Importar</button>
            <input type="file" id="importGlobal" accept=".json" style="display:none" onchange="importGlobalBackup(event)">
        </div>
    </div>

    <div class="footer-note">
        System Active - v1.0.0<br>
        <small id="status-offline" style="display:none; color: #ef4444; margin-top: 5px; display: block;">[ Offline Mode ]</small>
    </div>

    <script>
        // --- SISTEMA DE LOGIN (PIN) ---
        const PIN_CORRECTO = "2026";

        if (sessionStorage.getItem('auth') === 'true') {
            document.getElementById('login-screen').style.display = 'none';
        }

        function checkPin() {
            const input = document.getElementById('pin-input');
            const errorText = document.getElementById('pin-error');
            
            if (input.value.length === 4) {
                if (input.value === PIN_CORRECTO) {
                    sessionStorage.setItem('auth', 'true');
                    document.getElementById('login-screen').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('login-screen').style.display = 'none';
                    }, 300);
                } else {
                    errorText.style.opacity = '1';
                    input.value = '';
                    setTimeout(() => { errorText.style.opacity = '0'; }, 2000);
                }
            }
        }

        // --- RESPALDO GLOBAL MAESTRO ---
        const GLOBAL_KEYS = [
            'cpu_prods_data', 'cpu_hist_data', 'cpu_wish_data', // Compras 2026
            'tarjetasPremiumV3', // Tarjetas
            'topo_tasks_v1', 'topo_notes_v1', 'topo_hs_v1', 'topo_vision_v1', // Plan Topografía
            'fin_tasks_v1', 'fin_notes_v1', 'fin_hs_v1', 'fin_vision_v1',     // Plan Finanzas
            'gym_tasks_v1', 'gym_notes_v1', 'gym_hs_v1', 'gym_vision_v1',     // Plan Gimnasio
            'topo_settings_v1', 'topo_start_date_v1', 'gym_mode_v1', 'gym_measurements_v1' // Configs y Medidas
        ];

        function exportGlobalBackup() {
            const data = { 
                version: "PIEROVSKI_GLOBAL_V1", 
                fecha: new Date().toISOString(), 
                payload: {} 
            };
            
            GLOBAL_KEYS.forEach(key => {
                const val = localStorage.getItem(key);
                if (val) {
                    try { data.payload[key] = JSON.parse(val); } 
                    catch(e) { data.payload[key] = val; }
                }
            });

            const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `PIEROVSKI_GLOBAL_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
            alert('✅ Respaldo global exportado con éxito.');
        }

        function importGlobalBackup(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = e => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.version !== "PIEROVSKI_GLOBAL_V1" || !data.payload) {
                        alert('⚠️ El archivo no es un respaldo global válido de PIEROVSKI.');
                        return;
                    }
                    
                    if (confirm('⚠️ ATENCIÓN: Esto sobrescribirá todo el sistema local (Compras, Tarjetas y Planes) con los datos del archivo. ¿Continuar?')) {
                        Object.keys(data.payload).forEach(key => {
                            const valToSave = typeof data.payload[key] === 'object' ? JSON.stringify(data.payload[key]) : data.payload[key];
                            localStorage.setItem(key, valToSave);
                        });
                        alert('✅ Sistema restaurado por completo. Ingresa nuevamente tu PIN.');
                        location.reload();
                    }
                } catch (err) {
                    alert('❌ Error al leer el archivo JSON.');
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        // --- SERVICE WORKER ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW OK'))
                    .catch(err => console.log('SW Error', err));
            });
        }

        window.addEventListener('offline', () => {
            document.getElementById('status-offline').style.display = 'block';
        });
        window.addEventListener('online', () => {
            document.getElementById('status-offline').style.display = 'none';
        });
    </script>
</body>
</html>
