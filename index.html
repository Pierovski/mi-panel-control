<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pierovski Center</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d1b2a">
    <link rel="apple-touch-icon" href="icon.png">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;600;700&display=swap');
        
        body {
            background-color: #f5f7fa;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: #1e293b;
        }

        /* --- PANTALLA DE BLOQUEO --- */
        #login-screen {
            position: fixed;
            inset: 0;
            background-color: #0d1b2a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            color: white;
            transition: opacity 0.3s ease;
        }

        .login-title {
            font-family: 'DM Mono', monospace;
            font-size: 1.2em;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #e8a838;
            margin-bottom: 30px;
        }

        #pin-input {
            font-family: 'DM Mono', monospace;
            font-size: 2em;
            letter-spacing: 15px;
            padding: 10px;
            border: none;
            border-bottom: 2px solid #52c974;
            background: transparent;
            color: white;
            text-align: center;
            width: 180px;
            outline: none;
        }

        #pin-input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        /* --- TÍTULO ANIMADO Y TECNOLÓGICO --- */
        .brand-container {
            margin: 50px 0 40px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .brand-subtitle {
            font-family: 'DM Mono', monospace;
            font-size: 0.65em;
            letter-spacing: 5px;
            color: #94a3b8;
        }

        .brand-title {
            font-family: 'DM Mono', monospace;
            font-size: 1.8em;
            margin: 0;
            letter-spacing: 2px;
            font-weight: 500;
            color: #0d1b2a;
            position: relative;
            display: inline-block;
        }

        /* Línea animada con los 3 colores */
        .brand-title::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            width: 100%;
            height: 3px;
            /* Degradado con el amarillo, verde y rojo de tus botones */
            background: linear-gradient(90deg, #e8a838, #52c974, #ef4444, #e8a838);
            background-size: 200% 100%;
            animation: gradient-slide 3s linear infinite;
            border-radius: 2px;
        }

        @keyframes gradient-slide {
            0% { background-position: 100% 0; }
            100% { background-position: -100% 0; }
        }

        /* --- BOTONES --- */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 500px;
        }

        .menu-btn {
            background: white;
            border-radius: 16px;
            padding: 25px 15px;
            text-align: center;
            text-decoration: none;
            color: #334155;
            font-weight: 600;
            font-size: 1em;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            -webkit-tap-highlight-color: transparent;
        }

        .menu-btn:active {
            transform: scale(0.95);
            background-color: #fcfcfc;
        }

        .icon {
            font-size: 2.2em;
        }

        /* Colores solicitados */
        .btn-compras { border-bottom: 4px solid #e8a838; } /* Amarillo */
        .btn-plan { border-bottom: 4px solid #52c974; }    /* Verde */
        .btn-tarjetas { border-bottom: 4px solid #ef4444; } /* Rojo */

        /* --- FOOTER --- */
        .footer-note {
            margin-top: auto;
            padding: 30px 0;
            font-size: 0.75em;
            font-family: 'DM Mono', monospace;
            color: #94a3b8;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-title">Acceso Restringido</div>
        <input type="password" id="pin-input" inputmode="numeric" maxlength="4" placeholder="••••" oninput="checkPin()">
        <p id="pin-error" style="color: #ef4444; font-family: 'DM Mono', monospace; font-size: 0.8em; margin-top: 15px; opacity: 0;">PIN Incorrecto</p>
    </div>

    <div class="brand-container">
        <div class="brand-subtitle"></div>
        <h1 class="brand-title">PIEROVSKI CENTER</h1>
    </div>

    <div class="menu-grid">
        <a href="compras.html" class="menu-btn btn-compras">
            <span class="icon">🛒</span>
            <span>Compras 2026</span>
        </a>
        
        <a href="plan.html" class="menu-btn btn-plan">
            <span class="icon">📋</span>
            <span>12 Semanas</span>
        </a>
        
        <a href="tarjetas.html" class="menu-btn btn-tarjetas">
            <span class="icon">💳</span>
            <span>Tarjetas</span>
        </a>
    </div>

    <div class="footer-note">
        System Active - v1.0.0<br>
        <small id="status-offline" style="display:none; color: #ef4444; margin-top: 5px; display: block;">[ Offline Mode ]</small>
    </div>

    <script>
        // --- SISTEMA DE LOGIN (PIN) ---
        const PIN_CORRECTO = "2026"; // <-- Tu clave actual es 2026

        if (sessionStorage.getItem('auth') === 'true') {
            document.getElementById('login-screen').style.display = 'none';
        }

        function checkPin() {
            const input = document.getElementById('pin-input');
            const errorText = document.getElementById('pin-error');
            
            if (input.value.length === 4) {
                if (input.value === PIN_CORRECTO) {
                    sessionStorage.setItem('auth', 'true');
                    document.getElementById('login-screen').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('login-screen').style.display = 'none';
                    }, 300);
                } else {
                    errorText.style.opacity = '1';
                    input.value = '';
                    setTimeout(() => { errorText.style.opacity = '0'; }, 2000);
                }
            }
        }

        // --- SERVICE WORKER ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW OK'))
                    .catch(err => console.log('SW Error', err));
            });
        }

        window.addEventListener('offline', () => {
            document.getElementById('status-offline').style.display = 'block';
        });
        window.addEventListener('online', () => {
            document.getElementById('status-offline').style.display = 'none';
        });
    </script>
</body>
</html>
